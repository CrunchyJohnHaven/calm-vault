<?xml version="1.0" encoding="UTF-8"?>
<!--
AAO-Certified badge — visual mark for AI-operated organizations governed by
the AAO Network protocol.

Spec: AAO_CERTIFIED_SPEC.md in this repo.

Outer ring text: "AAO-CERTIFIED" with mascot silhouette
Inner: entity registration number (placeholder #001 here; real entities
substitute their own)

Color variants:
- Default: black-on-cream (this file)
- Constructivist: swap fill colors to red-on-black for the technosocialism
  aesthetic

Designed to scale from 24px footer to 120px+ hero placement.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>AAO-Certified Badge — Entity #001</title>
  <desc>Trust mark for AI-operated organizations governed by the AAO Network protocol</desc>

  <!-- Cream background circle -->
  <circle cx="100" cy="100" r="95" fill="#f4ead9" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- Curved text path for outer ring: AAO-CERTIFIED -->
  <defs>
    <path id="outerArc" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
    <path id="bottomArc" d="M 170 100 A 70 70 0 0 1 30 100" fill="none"/>
  </defs>

  <text font-family="Georgia, serif" font-size="16" font-weight="800" letter-spacing="2.5" fill="#0a0a0a">
    <textPath href="#outerArc" startOffset="50%" text-anchor="middle">★  AAO-CERTIFIED  ★</textPath>
  </text>

  <text font-family="Georgia, serif" font-size="9" letter-spacing="1.2" fill="#0a0a0a">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">GOVERNED BY PROTOCOL</textPath>
  </text>

  <!-- Dennis silhouette inside (compact version of the AAO Network mascot mark) -->
  <g transform="translate(82, 65)">
    <!-- Hood outline -->
    <path d="
      M 18 0
      C 9 0, 3 4, 2 10
      C 1 14, 1 18, 2 22
      L 2 38
      C 2 46, 5 52, 12 58
      L 16 64
      C 18 66, 20 67, 22 67
      L 30 67
      C 32 67, 34 66, 36 64
      L 40 58
      C 47 52, 50 46, 50 38
      L 50 22
      C 51 18, 51 14, 50 10
      C 49 4, 43 0, 34 0
      L 18 0
      Z
    " fill="#0a0a0a"/>

    <!-- Face cavity -->
    <path d="
      M 26 13
      C 21 13, 17 17, 17 23
      C 17 28, 19 33, 22 37
      L 24 41
      C 25 43, 27 44, 28 44
      L 28 44
      C 29 44, 31 43, 32 41
      L 34 37
      C 37 33, 39 28, 39 23
      C 38 17, 35 13, 28 13
      Z
    " fill="#f4ead9"/>

    <!-- Tiny mouth -->
    <ellipse cx="28" cy="31" rx="2" ry="3.5" fill="#0a0a0a"/>
  </g>

  <!-- Registration number block (centered, below the mascot) -->
  <text x="100" y="148" font-family="Georgia, serif" font-size="20" font-weight="700" letter-spacing="2" fill="#0a0a0a" text-anchor="middle">#001</text>

  <!-- Attestation hash fragment -->
  <text x="100" y="166" font-family="Menlo, monospace" font-size="8" letter-spacing="1" fill="#5a5a5a" text-anchor="middle">79d943…544a4c</text>
</svg>
